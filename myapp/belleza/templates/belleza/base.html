<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1, shrink-to-fit=no'>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
        <style>
        body {
            font-family: 'Noto Serif JP', serif;
            -webkit-font-smoothing: antialiased;
            letter-spacing: 0.05em; 
        }
        body {padding-top: 80px;}
        body {
            color: #d4af37 !important;
            background-color: #111;
        }
        a {
            color: #d4af37 !important;
        }
        a:hover {
            color: #fceabb !important;
        }
        .gold-text {
            background: linear-gradient(45deg, #b67b03 0%, #daaf08 45%, #fee9a0 70%, #daaf08 85%, #b67b03 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            display: inline-block;

        }
        .logo-resize {
            width: 200px;
            height: auto;
        }
        .fade-up {
            opacity: 0;
            transform: translateY(30px); 
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
        }
        .fade-up.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3Base path fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E") !important;
        }
        .navbar-toggler {
            border-color: #d4af37;
        }
        </style>
    </head>
    <body>
        <!-- ナビゲーションバー -->    
        <nav class="navbar navbar-expand-lg navbar-gold bg-dark fixed-top">
        <a class="navbar-brand" href="{% url 'belleza:index' %}">Belleza</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
            
        <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
            <ul class="navbar-nav">
                <li class="nav-item active">
                    <a class="nav-link" href="{% url 'belleza:commitment' %}">こだわり</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'belleza:price' %}">価格・支払い</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'belleza:questionnaireandbook' %}">ご予約・お問合せ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'belleza:access' %}">アクセス</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'belleza:news' %}">ビフォーアフター</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'belleza:point' %}">プライバシーポリシー</a>
                </li>
                
            </ul>
        </div>
        </nav>
        <div class='container'>
            {% block content %}
            {% endblock %}
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
            const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
            }, { threshold: 0.1 });

            document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
            });
        </script>
    </body>
</html>
